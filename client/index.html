<html lang="ar" dir="rtl">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <title>Focus Flow | ذاكرة محلية لإدارة المشاريع</title>
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="Focus Flow تطبيق محلي لإدارة المشاريع والمهام والوكلاء من الجوال" />
    <meta name="theme-color" content="#c9a24d" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lateen" />
    <meta name="application-name" content="Focus Flow" />
    <meta name="msapplication-TileColor" content="#080807" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    
    <!-- Manifest and Icons -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />

    <!-- Google Fonts here, example:
    <link rel="preconnect" href="https://fonts.googleapis.com" />

  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(
            (registration) => {
              console.log('Service Worker registered:', registration);
            },
            (error) => {
              console.log('Service Worker registration failed:', error);
            }
          );
        });
      }
    </script>
  </body>

</html>
